name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (plugin)
        run: flutter pub get

      - name: Install dependencies (example)
        run: flutter pub get
        working-directory: example

      - name: Analyze plugin
        run: flutter analyze --no-fatal-infos

      - name: Analyze example
        run: flutter analyze --no-fatal-infos
        working-directory: example

      - name: Run plugin tests
        run: flutter test
        continue-on-error: true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build APK (debug)
        run: flutter build apk --debug
        working-directory: example

      - name: Build APK (release)
        run: flutter build apk --release
        working-directory: example

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: ios-pods-${{ hashFiles('example/ios/Podfile.lock') }}

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --release
        working-directory: example

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/macos/Pods
          key: macos-pods-${{ hashFiles('example/macos/Podfile.lock') }}

      - name: Build macOS
        run: flutter build macos --release
        working-directory: example

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: example/build/macos/Build/Products/Release/*.app
          retention-days: 14

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Linux
        run: flutter build linux --release
        working-directory: example

      - name: Package Linux binary
        run: |
          cd example/build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/crispchess-linux-x64.tar.gz .

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: crispchess-linux-x64.tar.gz
          retention-days: 14
